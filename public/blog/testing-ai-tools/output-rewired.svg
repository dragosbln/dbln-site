<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 560" role="img" aria-label="The output seam of the audit tool, before and after the testing layer. Before, compose wrote two markdown files directly from the analysis and the summary was distilled from the report; those two files carry red edges and pulse red, because freeform text is hard to test. Then the figure crossfades to the fixed version: audit-schema.json tells compose how to shape the output, compose commits every claim — statuses, classifications, evidence — into audit.json, the canonical deliverable written first, and both markdowns are rendered from that JSON alone. The old direct wiring stays behind as dashed remnants, and a new edge leaves audit.json and runs to the bottom of the figure, into the testing harness.">
  <title>The output, rewired</title>
  <desc>Before/after crossfade at the output seam: the untestable markdown-first wiring pulses red, then recedes to dashed remnants as audit-schema.json, audit.json and the star wiring appear, with the JSON feeding the testing harness.</desc>
  <defs>
    <marker id="or-ah" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#8a8c8f"/>
    </marker>
  </defs>

  <!-- state labels (crossfade) -->
  <g class="dg-recede">
    <text class="dg-band" x="20" y="12">before · markdown-first</text>
  </g>
  <g class="dg-appear">
    <text class="dg-band live" x="20" y="26">after · JSON-first</text>
  </g>

  <!-- upstream stub (persists) -->
  <text class="dg-note" x="20" y="44">unchanged upstream (fig. 1)</text>
  <path class="dg-edge" id="s1" d="M110 52 V 112" marker-end="url(#or-ah)"/>

  <!-- Compose (persists, same as fig. 1) -->
  <g class="dg-node" id="n5">
    <rect x="105" y="118" width="230" height="92" rx="8"/>
    <text class="t" x="220" y="142">Compose</text>
  </g>
  <g class="dg-chip plain" id="k1">
    <rect x="123" y="162" width="64" height="22" rx="11"/>
    <text x="155" y="177" text-anchor="middle">findings</text>
  </g>
  <g class="dg-chip plain" id="k2">
    <rect x="199" y="162" width="48" height="22" rx="11"/>
    <text x="223" y="177" text-anchor="middle">risks</text>
  </g>
  <g class="dg-chip plain" id="k3">
    <rect x="259" y="162" width="58" height="22" rx="11"/>
    <text x="288" y="177" text-anchor="middle">backlog</text>
  </g>

  <!-- views (persist; drawn before the overlays so the red edges sit on top) -->
  <g class="dg-node" id="n6">
    <rect x="45" y="406" width="130" height="54" rx="8"/>
    <text class="t" x="110" y="429">report.md</text>
    <text class="s" x="110" y="446">rendered view</text>
  </g>
  <g class="dg-node" id="n7">
    <rect x="265" y="406" width="130" height="54" rx="8"/>
    <text class="t" x="330" y="429">summary.md</text>
    <text class="s" x="330" y="446">rendered view</text>
  </g>

  <!-- BEFORE: dashed remnants (static, same paths as the receding wiring) -->
  <path class="dg-edge legacy" id="r1" d="M105 198 H 55 V 400"/>
  <path class="dg-edge legacy" id="r2" d="M105 182 H 32 V 480 H 330 V 466"/>
  <path class="dg-edge legacy" id="r3" d="M175 433 H 259"/>

  <!-- BEFORE: solid wiring + the red flaw (all recede together) -->
  <g class="dg-recede">
    <path class="dg-edge" d="M105 198 H 55 V 400" marker-end="url(#or-ah)"/>
    <path class="dg-edge" d="M105 182 H 32 V 480 H 330 V 466" marker-end="url(#or-ah)"/>
    <path class="dg-edge" d="M175 433 H 259" marker-end="url(#or-ah)"/>
    <text class="dg-note" x="68" y="292">written directly</text>
    <text class="dg-note" x="68" y="306">from the analysis</text>
    <text class="dg-note" x="220" y="426" text-anchor="middle">distilled</text>
    <rect x="45" y="406" width="130" height="54" rx="8" fill="none" stroke="#a83a2e" stroke-width="1.2"/>
    <rect x="265" y="406" width="130" height="54" rx="8" fill="none" stroke="#a83a2e" stroke-width="1.2"/>
    <text class="dg-note fail" x="220" y="384" text-anchor="middle">freeform text · hard to test</text>
  </g>

  <!-- BEFORE: one solid red beat, then the crossfade takes over -->
  <g class="dg-pulse" style="--i: 1.5;">
    <rect class="hl" x="41" y="402" width="138" height="62" rx="10"/>
    <rect class="hl" x="261" y="402" width="138" height="62" rx="10"/>
  </g>

  <!-- AFTER: schema in, audit.json and the star wiring (appears) -->
  <g class="dg-appear">
    <g class="dg-node" id="n10">
      <rect x="230" y="40" width="160" height="54" rx="8"/>
      <text class="t" x="310" y="63">audit-schema.json</text>
      <text class="s" x="310" y="80">the output contract</text>
    </g>
    <path class="dg-edge" id="a0" d="M310 94 V 112" marker-end="url(#or-ah)"/>

    <path class="dg-edge" id="a1" d="M220 210 V 246" marker-end="url(#or-ah)"/>
    <g class="dg-step" id="st1">
      <circle cx="220" cy="227" r="8"/>
      <text x="220" y="230" text-anchor="middle">1</text>
    </g>
    <text class="dg-note" x="204" y="224" text-anchor="end">commit claims</text>
    <text class="dg-note" x="204" y="238" text-anchor="end">to the JSON</text>

    <g class="dg-node key" id="n9">
      <rect x="80" y="252" width="280" height="88" rx="8"/>
      <text class="t" x="220" y="276">audit.json</text>
      <text class="s" x="220" y="293">canonical · written first</text>
    </g>
    <g class="dg-cell" id="c1">
      <rect x="96" y="304" width="62" height="24" rx="6"/>
      <text x="127" y="320" text-anchor="middle">statuses</text>
    </g>
    <g class="dg-cell" id="c2">
      <rect x="166" y="304" width="107" height="24" rx="6"/>
      <text x="219" y="320" text-anchor="middle">classifications</text>
    </g>
    <g class="dg-cell" id="c3">
      <rect x="281" y="304" width="62" height="24" rx="6"/>
      <text x="312" y="320" text-anchor="middle">evidence</text>
    </g>

    <path class="dg-edge" id="a2" d="M220 340 V 364 H 110 V 400" marker-end="url(#or-ah)"/>
    <path class="dg-edge" id="a3" d="M220 340 V 364 H 330 V 400" marker-end="url(#or-ah)"/>
    <g class="dg-step" id="st2">
      <circle cx="220" cy="364" r="8"/>
      <text x="220" y="367" text-anchor="middle">2</text>
    </g>
    <text class="dg-note" x="220" y="384" text-anchor="middle">render views</text>
    <text class="dg-note" x="220" y="398" text-anchor="middle">from the JSON alone</text>

    <path class="dg-edge" id="h1" d="M360 296 H 410 V 524" marker-end="url(#or-ah)"/>
    <text class="dg-note" x="432" y="544" text-anchor="end" fill="#0a5b55">testing harness</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" role="img" aria-label="Path 2, the token-broker BFF with a session DB, across five swimlanes: BROWSER, TOKEN BROKER (LAMBDA), SESSION DB, AWS API GATEWAY and BACKEND SERVICE. The browser holds only an opaque session cookie. A user triggers an API call, which drops into the Token Broker Lambda: it receives the request with the session cookie, looks the session up by cookie ID, and forwards the request with an Authorization Bearer header. To resolve the session it must round-trip to the Session DB — marked teal — sending the cookie ID down and getting the Cognito tokens back up. That lookup happens on every single authenticated call. The forwarded request then drops to the AWS API Gateway, where a JWT authorizer validates the token and forwards to the backend, which executes business logic and builds a response that returns up the right side to update the UI. The animated element is the down-and-back-up round trip to the Session DB, whose box pulses with a teal ring, showing that a stateful store you now own and operate sits on the hot path of every request.">
  <title>Path 2: Token-broker BFF — every call round-trips through a session store you own</title>
  <desc>An opaque session cookie is exchanged, per request, for Cognito tokens held in a session DB. That DB lookup is on the hot path of all authenticated traffic and becomes its availability ceiling — a stateful substrate you now own and operate.</desc>
  <defs>
    <marker id="p2-ah" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#8a8c8f"/>
    </marker>
  </defs>

  <!-- swimlane separators -->
  <line x1="10" y1="44"  x2="790" y2="44"  stroke="#d9d5cb" stroke-width="1"/>
  <line x1="10" y1="176" x2="790" y2="176" stroke="#d9d5cb" stroke-width="1"/>
  <line x1="10" y1="308" x2="790" y2="308" stroke="#d9d5cb" stroke-width="1"/>
  <line x1="10" y1="440" x2="790" y2="440" stroke="#d9d5cb" stroke-width="1"/>
  <line x1="10" y1="572" x2="790" y2="572" stroke="#d9d5cb" stroke-width="1"/>
  <line x1="10" y1="696" x2="790" y2="696" stroke="#d9d5cb" stroke-width="1"/>

  <!-- swimlane captions -->
  <text class="dg-band" x="16" y="64">Browser</text>
  <text class="dg-band" x="16" y="196">Token Broker (Lambda)</text>
  <text class="dg-band live" x="16" y="328">Session DB</text>
  <text class="dg-band" x="16" y="460">AWS API Gateway</text>
  <text class="dg-band" x="16" y="592">Backend Service</text>

  <!-- ===== BROWSER lane ===== -->
  <g class="dg-node" id="n1">
    <rect x="18" y="84" width="136" height="52" rx="8"/>
    <text class="t" x="86" y="106">User triggers</text>
    <text class="s" x="86" y="123">API call</text>
  </g>

  <g class="dg-node" id="n2">
    <rect x="646" y="84" width="136" height="52" rx="8"/>
    <text class="t" x="714" y="114">Update UI</text>
  </g>

  <!-- ===== TOKEN BROKER (LAMBDA) lane ===== -->
  <g class="dg-node" id="n3">
    <rect x="18" y="216" width="136" height="52" rx="8"/>
    <text class="t" x="86" y="238">Receive request</text>
    <text class="s" x="86" y="255">w/ session cookie</text>
  </g>

  <g class="dg-node" id="n4">
    <rect x="175" y="216" width="136" height="52" rx="8"/>
    <text class="t" x="243" y="238">Look up session</text>
    <text class="s" x="243" y="255">by cookie ID</text>
  </g>

  <g class="dg-node" id="n5">
    <rect x="332" y="216" width="136" height="52" rx="8"/>
    <text class="t" x="400" y="238">Forward request</text>
    <text class="s" x="400" y="255">w/ Bearer header</text>
  </g>

  <g class="dg-node" id="n6">
    <rect x="646" y="216" width="136" height="52" rx="8"/>
    <text class="t" x="714" y="238">Return response</text>
    <text class="s" x="714" y="255">to browser</text>
  </g>

  <!-- ===== SESSION DB lane — the stateful store you now own ===== -->
  <g class="dg-node key" id="nDB">
    <rect x="175" y="348" width="136" height="52" rx="8"/>
    <text class="t" x="243" y="370">Session DB</text>
    <text class="s" x="243" y="387">holds tokens</text>
  </g>
  <text class="dg-note" x="243" y="424" text-anchor="middle">every call → one DB lookup</text>

  <!-- ===== AWS API GATEWAY lane ===== -->
  <g class="dg-node" id="n7">
    <rect x="332" y="480" width="136" height="52" rx="8"/>
    <text class="t" x="400" y="502">JWT authorizer</text>
    <text class="s" x="400" y="519">validates token</text>
  </g>

  <g class="dg-node" id="n8">
    <rect x="489" y="480" width="136" height="52" rx="8"/>
    <text class="t" x="557" y="502">Forward</text>
    <text class="s" x="557" y="519">to backend</text>
  </g>

  <!-- ===== BACKEND SERVICE lane ===== -->
  <g class="dg-node" id="n9">
    <rect x="489" y="612" width="136" height="52" rx="8"/>
    <text class="t" x="557" y="634">Execute</text>
    <text class="s" x="557" y="651">business logic</text>
  </g>

  <g class="dg-node" id="n10">
    <rect x="646" y="612" width="136" height="52" rx="8"/>
    <text class="t" x="714" y="634">Build</text>
    <text class="s" x="714" y="651">response</text>
  </g>

  <!-- ===== request path (static gray plumbing) ===== -->
  <path class="dg-edge" id="e1" d="M86 136 V214"  marker-end="url(#p2-ah)"/>
  <path class="dg-edge" id="e2" d="M154 242 H173" marker-end="url(#p2-ah)"/>
  <path class="dg-edge" id="e5" d="M311 242 H330" marker-end="url(#p2-ah)"/>
  <path class="dg-edge" id="e6" d="M400 268 V478" marker-end="url(#p2-ah)"/>
  <path class="dg-edge" id="e7" d="M468 506 H487" marker-end="url(#p2-ah)"/>
  <path class="dg-edge" id="e8" d="M557 532 V610" marker-end="url(#p2-ah)"/>
  <path class="dg-edge" id="e9" d="M625 638 H644" marker-end="url(#p2-ah)"/>

  <!-- response leg back up the right side, through the broker -->
  <path class="dg-edge" id="e10" d="M714 612 V270" marker-end="url(#p2-ah)"/>
  <path class="dg-edge" id="e11" d="M714 216 V138" marker-end="url(#p2-ah)"/>
  <text class="dg-note" x="704" y="440" text-anchor="end">response</text>

  <!-- ===== the DB round-trip: the one hot-path idea (query down, tokens up) ===== -->
  <path class="dg-edge" id="eq" d="M225 268 V346" marker-end="url(#p2-ah)"/>
  <path class="dg-edge" id="er" d="M261 346 V270" marker-end="url(#p2-ah)"/>
  <text class="dg-note" x="196" y="312" text-anchor="end">cookie ID</text>
  <text class="dg-note" x="290" y="312">tokens</text>

  <!-- motion: the only animated idea — every call pays a DB round-trip -->
  <path class="dg-flow run" d="M225 268 V346"/>
  <path class="dg-flow run" d="M261 346 V270"/>

  <!-- pulsing teal ring reinforcing the Session DB as the focal hot-path node -->
  <g class="dg-pulse live" style="--i: 0;">
    <rect class="hl" x="171" y="344" width="144" height="60" rx="10"/>
  </g>
</svg>
